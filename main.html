
<!DOCTYPE html>
<html>
<head>
    <title>Tables in Tables</title>
    <style>
        table, th, td {
            border: 2px solid black;
            border-collapse: collapse;
            padding: 6px;
            text-align: center;
        }
        .main {
            width: 100%;
        }
        .nested {
            width: 100%;
        }
        .black {
            background-color: black;
            color: white;
            font-weight: bold;
        }
        a {
            color: purple;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<table class="main">
    <tr>
        <!-- Top Left: Nested Table 2 -->
        <td>
            <table class="nested">
                <tr>
                    <th colspan="2">Nested Table 2</th>
                </tr>
                <tr>
                    <th>Column 1</th>
                    <th>Column 2</th>
                </tr>
                <tr>
                    <td>abc</td>
                    <td>def</td>
                </tr>
            </table>
        </td>

        <!-- Top Right: Nested Table 1 -->
        <td>
            <table class="nested">
                <tr>
                    <th>Nested Table 1</th>
                </tr>
                <tr>
                    <td>
                        <ul style="text-align:left;">
                            <li>List item</li>
                            <li>List item</li>
                            <li>List item</li>
                        </ul>
                    </td>
                </tr>
            </table>
        </td>
    </tr>

    <tr>
        <!-- Bottom Left: Nested Table 3 -->
        <td>
            <table class="nested">
                <tr>
                    <th colspan="2">Nested Table 3</th>
                </tr>
                <tr>
                    <td>
                        <a href="#">Nested Table</a>
                    </td>
                    <td>Demo Continued</td>
                </tr>
            </table>
        </td>

        <!-- Bottom Right: Nested Table 4 -->
        <td>
            <table class="nested">
                <tr>
                    <th>Nested Table 4</th>
                </tr>
                <tr>
                    <td class="black">HTML</td>
                </tr>
            </table>
        </td>
    </tr>
</table>

</body>
</html>
